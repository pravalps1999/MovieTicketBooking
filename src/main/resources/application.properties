spring.application.name=MovieTicketBooking
#MYSQL
server.port=8085
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.datasource.url=jdbc:mysql://localhost:3306/db_movie_ticket_booking?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=praval1999@
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jackson.deserialization.fail-on-null-for-primitives=false

#MAIL
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_username
spring.mail.password=your_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

#PAYMENT_GATEWAY
razorpay.key=razorpay_key
razorpay.secret=razorpay_secret

#REDIS
spring.data.redis.host=localhost
spring.data.redis.port=6379

# enable redis cache
spring.cache.type=redis

#File
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
